name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install ruff mypy bandit pip-audit
          # liboqs-python requires compiled binaries — skip in CI, fallback to Ed25519
          pip install cryptography || true

      - name: Run make ci
        run: make ci
