pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.{py}"
      run: |
        if [ -x .venv/Scripts/ruff.exe ]; then
          ruff=.venv/Scripts/ruff.exe
        else
          ruff=.venv/bin/ruff
        fi
        "$ruff" format --force-exclude --check {staged_files} || {
          "$ruff" format --force-exclude {staged_files}
          echo 'Files reformatted; please re-stage and re-commit.'
          exit 1
        }
    lint:
      glob: "*.{py}"
      run: |
        if [ -x .venv/Scripts/ruff.exe ]; then
          ruff=.venv/Scripts/ruff.exe
        else
          ruff=.venv/bin/ruff
        fi
        "$ruff" check --force-exclude {staged_files}
    gitleaks:
      run: which gitleaks > /dev/null && gitleaks protect --staged --redact --no-banner || true

commit-msg:
  commands:
    conventional:
      run: |
        msg=$(head -1 "{1}")
        if echo "$msg" | grep -Eq '^(feat|fix|chore|refactor|test|docs|ci|perf|style)(\([a-z0-9-]+\))?: .{3,}'; then
          exit 0
        fi
        echo ""
        echo "  Commit message must follow Conventional Commits:"
        echo "    <type>(<scope>): <description>"
        echo "  Types: feat fix chore refactor test docs ci perf style"
        echo "  Scopes: agent ontology eval voice atak routing data hardware deploy models mesh security crypto infra docs ci"
        echo "  Got: $msg"
        echo ""
        exit 1

pre-push:
  commands:
    ci:
      run: make ci
