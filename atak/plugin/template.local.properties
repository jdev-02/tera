# Copy this file to local.properties (gitignored) and fill in your paths.
sdk.dir=/Users/<you>/Library/Android/sdk

# The public repo does not vendor ATAK SDK artifacts. Copy
# atak-gradle-takdev.jar, main.jar, mapping.txt, and android_keystore from a
# locally extracted ATAK-CIV SDK into atak/plugin/tools/ before building.

# If you have TAK Maven credentials and want to resolve the Gradle plugin from
# artifacts.tak.gov instead of tools/atak-gradle-takdev.jar, uncomment these:
# takrepo.url=https://artifacts.tak.gov/artifactory/maven
# takrepo.user=<username>
# takrepo.password=<password>

# When building plugins you can manually set the version code so it is easier
# to bisect code; just set takStaticVersion.
#takStaticVersion=1001
