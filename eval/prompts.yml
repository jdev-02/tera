    destination_type: freshwater
    max_distance_km: 5
    constraints: []
    allowed_data_layers: [hydrography, terrain]
    authority_context:
      user_role: operator
      requires_approval: false
  notes: "No explicit max_distance_km -- ontology default is 5."

